name: Notebooks

on:
  push:
    branches: [main]
    paths:
      - 'pyvisco/**'
      - 'verification/**.ipynb'
      - 'tutorials/**'
      - 'sample_data/**'
      - 'LinViscoFit.ipynb'
      - 'pyproject.toml'
      - '.github/workflows/notebooks.yml'
  pull_request:
    branches: [main]
    paths:
      - 'pyvisco/**'
      - 'verification/**.ipynb'
      - 'tutorials/**'
      - 'sample_data/**'
      - 'LinViscoFit.ipynb'
      - 'pyproject.toml'
      - '.github/workflows/notebooks.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  execute:
    name: validate notebooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # for setuptools-scm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package with test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Validate verification notebooks (compare outputs with nbval)
        run: |
          pytest --nbval --sanitize-with verification/nbval_sanitize.cfg \
            verification/verify_freq_master.ipynb \
            verification/verify_freq_raw.ipynb \
            verification/verify_time_master.ipynb

      - name: Smoke-test voila GUI notebook (nbval-lax)
        # LinViscoFit.ipynb is a voila app: cells display ipywidgets whose
        # model_ids change every run, so we only check that it executes
        # without raising (no output comparison).
        run: pytest --nbval-lax LinViscoFit.ipynb

      - name: Smoke-test tutorial notebook (nbval-lax)
        # Outputs include figure sizes / Prony optimization results which can
        # vary slightly across platforms, so don't compare outputs.
        run: pytest --nbval-lax tutorials/tutorial.ipynb

      - name: Smoke-test tutorial scripts
        run: |
          python tutorials/freq_master.py
          python tutorials/freq_raw.py
          python tutorials/time_master.py
