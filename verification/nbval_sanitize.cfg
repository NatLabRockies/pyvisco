[regex1]
# Strip trailing digits beyond ~6 significant figures in floats (cross-platform drift)
regex: (\d+\.\d{6})\d+
replace: \1

[regex2]
# ipywidgets model_id values
regex: (model_id|version_major|version_minor)\s*:\s*[\w\d.-]+
replace: \1: <ID>

[regex3]
# Memory addresses (e.g. 0x7f8a9c0d1e20)
regex: 0x[0-9a-fA-F]{6,}
replace: 0xADDR

[regex4]
# matplotlib Figure size repr variations
regex: <Figure size \d+x\d+ with \d+ Axes>
replace: <Figure>
